name: Generate Snake Animation

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC every day
    - cron: "0 0,12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake animation SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check artifacts status
        if: always()
        run: |
          echo "📊 Checking artifacts status..."

          # Get all artifacts
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts?per_page=100")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Failed to fetch artifacts"
            exit 0
          fi

          # Count artifacts
          TOTAL=$(echo "$BODY" | grep -o '"total_count": [0-9]*' | grep -o '[0-9]*' || echo "0")
          echo "📦 Total artifacts: $TOTAL"

          if [ "$TOTAL" -gt "0" ]; then
            echo "📋 Artifacts found:"
            echo "$BODY" | grep -o '"name": "[^"]*"' || true
          else
            echo "✅ No artifacts stored"
          fi
